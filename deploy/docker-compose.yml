services:
  countdown:
    image: ghcr.io/reisi007/countdown:latest
    container_name: countdown
    restart: unless-stopped
    ports:
      - "3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode >= 200 && r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      webnet:
        ipv4_address: 172.18.0.55

networks:
  webnet:
    external: true